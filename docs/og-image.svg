<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0b0e"/>
      <stop offset="100%" stop-color="#161922"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#c8f93d" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c8f93d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#c8f93d" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- top-left corner brand mark -->
  <g transform="translate(80, 80)">
    <circle cx="8" cy="8" r="6" fill="#c8f93d"/>
    <text x="22" y="14" font-family="JetBrains Mono, monospace" font-size="13" fill="#9c958a" letter-spacing="2">LIVE · 每日自动更新</text>
  </g>

  <!-- main wordmark -->
  <g transform="translate(80, 240)">
    <text font-family="Fraunces, Georgia, serif" font-size="140" font-weight="500" fill="#ebe6dc" letter-spacing="-3">
      <tspan>M</tspan><tspan dy="-40" font-size="74" fill="#c8f93d" font-weight="700">2</tspan><tspan dy="40" fill="#ebe6dc">·</tspan><tspan font-style="italic" fill="#ebe6dc">Alpha</tspan>
    </text>
  </g>

  <!-- subtitle -->
  <text x="80" y="320" font-family="JetBrains Mono, monospace" font-size="20" fill="#9c958a" letter-spacing="1">
    Micro-Macro Alpha Engine · 自研深度学习 A 股截面选股模型
  </text>

  <!-- key stats row -->
  <g transform="translate(80, 430)" font-family="JetBrains Mono, monospace">
    <g>
      <text font-size="14" fill="#5b5e68" letter-spacing="1">OOS SHARPE</text>
      <text y="48" font-size="56" font-weight="700" fill="#c8f93d">2.93</text>
    </g>
    <g transform="translate(260, 0)">
      <text font-size="14" fill="#5b5e68" letter-spacing="1">CUM. RETURN</text>
      <text y="48" font-size="56" font-weight="700" fill="#c8f93d">+121%</text>
    </g>
    <g transform="translate(560, 0)">
      <text font-size="14" fill="#5b5e68" letter-spacing="1">MAX DRAWDOWN</text>
      <text y="48" font-size="56" font-weight="700" fill="#ff6b3c">-12.6%</text>
    </g>
    <g transform="translate(900, 0)">
      <text font-size="14" fill="#5b5e68" letter-spacing="1">月胜率</text>
      <text y="48" font-size="56" font-weight="700" fill="#c8f93d">82%</text>
    </g>
  </g>

  <!-- bottom footer -->
  <g transform="translate(80, 560)" font-family="JetBrains Mono, monospace" font-size="13" fill="#5b5e68" letter-spacing="1">
    <text>johnny-xuan.github.io/M2-Alpha · CSI 300 · 11 个月 OOS 验证 · 每个交易日自动更新</text>
  </g>
</svg>
